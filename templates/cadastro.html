<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
</head>
<body>

<h1>Cadastro</h1>

    <form action="/Fcadastro" method="post">
        <label>Nome Completo:</label>
        <input type="text" name="nome" step="any" required>
        <br><br>
  
         <label>Email:       </label>
         <input type="text" name="email" step="any" required>
         <br><br>

        <label>telefone:     </label>
        <input type="text" name="fone" step="any" required>
        <br><br>

        <label>curso:        </label>
        <input type="text" name="curso" step="any" required>
        <br><br>

        <label>série:        </label>
        <input type="number" name="serie" step="any" required>
        <br><br>
    
        <label>senha:        </label>
        <input type="text" name="senha" step="any" required>
        <br><br>

        <button type="submit">cadastrar</button>
    </form>

<a href="{{url_for ('login')}}">enviar cadastro</a>

</body>
</html>
