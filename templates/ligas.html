<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Ligas</title>
</head>
<body>

<h1>Cadastro de Ligas</h1>

    <form action="/Fliga" method="post">
        <label>Nome da Liga:</label>
        <input type="text" name="liga" step="any" required>
        <br><br>
        <label>Valor da Inscrição:</label>
        <input type="text" name="valor" step="any" required>
        <br><br>
        <label>Nome do criador/Admnistrador da liga:</label>
        <input type="text" name="nocr" step="any" required>
        <br><br>>
        <label>data de abertura das inicio:</label>
        <input type="date" name="datai" step="any" required>
        <br><br>
        <label>fechamento de pagamento:</label>
        <input type="date" name="fechamento" step="any" required>
        <br><br>
        <label>descrição:</label>
        <input type="text" name="dscr" step="any" required>
        <br><br>
        <label>tipo(equipe, dupla, solo...):</label>
        <input type="text" name="tipo" step="any" required>
        <br><br>
        <button type="submit">criar liga</button>
    </form>



</body>
</html>
